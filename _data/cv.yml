    Experience:
      - company: Fraunhofer Institute for Integrated Systems and Device Technology (IISB)
        position: Research Assistant – Differentiable Physics & GPU Acceleration
        location: Erlangen, Germany
        start_date: 2026-04
        end_date: Present
        summary: >
          Building differentiable FEM-based inverse design pipelines for PQ core transformers in JAX and Lineax. Currently conducting a systematic comparative study of optimization algorithms — L-BFGS-B, Adam, CMA-ES, NSGA-III, and Bayesian optimization — analyzing performance on iteration vs deviation to inductance, iteration vs geometry parameter evolution, and solver convergence speed.
        highlights:
          - "PQ Core Geometry Parameterization: Parameterized core geometry with 5 design variables (center post diameter, leg inner diameter, leg height, window height, coil clearance) for differentiable optimization."
          - "Differentiable FEM Solver: Built a JAX-based differentiable 2D axisymmetric FEM operator (Lineax backend) that computes inductance from geometry parameters with exact gradient support via grad/jit/vmap."
          - "Objective Function Design: Formulated loss function combining inductance targeting with optional volume regularization for multi-objective trade-off analysis."
          - "Analytical Model Integration: Implemented analytical fringing field model for hybrid FEM-analytical validation and benchmarking."
          - "Optimizer Benchmark Framework: Structured benchmark pipeline for comparing gradient-based (L-BFGS-B, Adam), evolutionary (CMA-ES, NSGA-III), and surrogate-based (Bayesian optimization) methods on convergence speed, accuracy, and constraint handling."
          - "Full Test Suite: 20+ unit tests covering FEM solver correctness, gradient accuracy, geometry parameterization, and optimization convergence across the PQ core design space."

      - company: Institute of Material Simulation, FAU Erlangen-Nürnberg
        position: Student Assistant – Multiphysics Simulation
        location: Erlangen, Germany
        start_date: 2025-01
        end_date: 2026-03
        summary: >
          Multiphysics FEA Simulation: Conducted complex thermo-electro-mechanical simulations using Abaqus to model the phase kinetics and non-linear actuation of Shape Memory Alloy (SMA) micro-actuators.
        highlights:
          - "Thermal Analysis & Heat Transfer: Analyzed temperature fields, Joule heating effects, and thermal dissipation mechanisms critical for the programmable folding of origami microsystems."
          - "Material Modeling (UMAT): Implemented and verified advanced material routines (Fortran UMAT) within Abaqus to accurately capture the coupled structural and thermal responses under varying boundary conditions."
          - "Scientific Publication: Co-authored a research abstract titled \"Simulation of shape memory alloy folding actuators for programmable origami microsystems,\" submitted to the 20th International Conference on New Actuator Systems (ACTUATOR 2026), Wiesbaden, Germany."

